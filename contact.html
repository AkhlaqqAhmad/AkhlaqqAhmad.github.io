<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
        integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="navbar">
            <p>Akhlaq Ahmad</p>

            <div class="nav-link">
                <div><a href="index.html">Home</a></div>
                <div><a href="index.html">About</a></div>
                <div><a href="contact.html">Contact</a></div>
                <div><a href="web_proj.html">projects</a></div>
            </div>
        </div>
    </div>
    <div class="section" style="margin-top: -450px;">
        <div class="container">

            <div class="row">

                <div class="col s12 ">

                    <h3 class="center-align black-text" id="contact">Contact</h3>



                </div>


            </div>

            <div class="section">

                <div class="container">
                    <div class="row center">
                        <div class="col s12 white">
                            <div class="contact-box">
                                <div class="row">
                                    <form class="col s12">
                                        <div class="row">
                                            <div class="input-field col s12">
                                                <i class="material-icons prefix">account_circle</i>
                                                <input id="icon_prefix" type="text" class="validate">
                                                <label for="icon_prefix">Name</label>
                                            </div>
                                            <div class="input-field col s12">
                                                <i class="material-icons prefix">phone</i>
                                                <input id="icon_telephone" type="tel" class="validate">
                                                <label for="icon_telephone">Telephone</label>
                                            </div>
                                            <div class="input-field col s12">
                                                <i class="material-icons prefix">email</i>
                                                <input id="icon_email" type="email" class="validate">
                                                <label for="icon_email">Email</label>
                                            </div>
                                            <div class="input-field col s12">
                                                <i class="material-icons prefix">edit</i>
                                                <textarea id="icon_prefix2" class="materialize-textarea"></textarea>
                                                <label for="icon_prefix2">Message</label>
                                            </div>
                                        </div>
                                        <button class="white-text waves-effect waves-light btn-large purple"
                                            type="submit" name="action">Submit
                                            <i class="material-icons right">send</i>
                                        </button>
                                    </form>
                                </div>
                            </div>

</body>

</html>
